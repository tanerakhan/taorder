# Sadece Windows .exe — düşük maliyet / ücretsiz public repo
# Tetikleme: workflow_dispatch veya main push (scripts/ci-workflow.sh run)

name: Release Windows Only

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'electron/**'
      - 'src/**'
      - '.github/workflows/**'

concurrency:
  group: release-windows-only
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: electron-builder önbelleği
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-builder-win-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-win-

      - name: Bağımlılıklar
        run: npm ci

      - name: Windows paketi derle
        run: npm run dist:win
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Çıktıları doğrula
        shell: pwsh
        run: |
          Get-ChildItem release/*.exe | Format-Table Name, Length
          if (-not (Test-Path release/TaOrder-*-x64.exe)) { throw "Kurulum .exe bulunamadı" }
          if (-not (Test-Path release/TaOrder-*-portable.exe)) { throw "Portable .exe bulunamadı" }

      - uses: actions/upload-artifact@v6
        with:
          name: windows
          retention-days: 90
          path: |
            release/TaOrder-*-x64.exe
            release/TaOrder-*-portable.exe
